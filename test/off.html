<!doctype html>
<meta charset="utf-8">
<title>FV Off runtime test</title>
<p id="status">Checking Off mode…</p>
<video muted autoplay></video>
<canvas id="source" width="320" height="180" hidden></canvas>
<script>
  const source = document.querySelector("#source");
  const context = source.getContext("2d");
  context.fillStyle = "#369";
  context.fillRect(0, 0, source.width, source.height);
  const video = document.querySelector("video");
  video.srcObject = source.captureStream(30);
  video.play();
  setTimeout(() => {
    if (document.querySelector("#fv-enhancer-canvas")) {
      document.querySelector("#status").textContent = "FAIL: canvas created in Off mode";
      return;
    }
    document.querySelector("#status").textContent = "PASS: Off mode has no canvas";
    fetch("/__fve_off_pass").catch(() => {});
  }, 2000);
</script>
